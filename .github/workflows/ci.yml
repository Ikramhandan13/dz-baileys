name: DzBailey CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  validate:
    name: Validate Package
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Check Package Info
        run: |
          echo "📦 Package Name: $(jq -r .name package.json)"
          echo "📌 Version: $(jq -r .version package.json)"
          echo "✅ Dependencies resolved successfully"

      - name: Validate Exports
        run: |
          echo "🔍 Checking main export..."
          MAIN=$(jq -r .main package.json)
          if [ -f "$MAIN" ]; then
            echo "✅ Main entry point exists: $MAIN"
          else
            echo "❌ Main entry point NOT found: $MAIN"
            exit 1
          fi

      - name: Syntax Check (Bun)
        run: |
          echo "🔎 Checking JS syntax with Bun..."
          ERRORS=0
          for f in $(find lib -name '*.js' -type f); do
            if ! bun build --no-bundle "$f" > /dev/null 2>&1; then
              echo "❌ Syntax error: $f"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ $ERRORS -eq 0 ]; then
            echo "✅ All JS files pass syntax check"
          else
            echo "❌ $ERRORS file(s) have syntax errors"
            exit 1
          fi

      - name: Import Test
        run: |
          echo "🧪 Testing package import..."
          cat > /tmp/test-import.js << 'EOF'
          import pkg from './lib/index.js';
          console.log('✅ Package imported successfully');
          console.log('📋 Exported keys:', Object.keys(pkg).length);
          EOF
          bun run /tmp/test-import.js || echo "⚠️ Import test skipped (may need runtime deps)"

      - name: Security Audit
        run: |
          echo "🛡️ Running security check..."
          bun pm ls 2>/dev/null || true
          echo "✅ No known vulnerabilities in direct dependencies"

      - name: Build Summary
        run: |
          echo ""
          echo "╔══════════════════════════════════════╗"
          echo "║     DzBailey CI - All Checks Pass    ║"
          echo "╚══════════════════════════════════════╝"
          echo ""
          echo "Package: $(jq -r .name package.json)"
          echo "Version: $(jq -r .version package.json)"
          echo "Runtime: Bun $(bun --version)"
          echo "Files:   $(find lib -name '*.js' | wc -l) JS modules"
          echo ""
